syntax = "proto3";

package spot_service.v2;

import "common/common.proto";
import "validate/validate.proto";

option go_package = "github.com/DenсCPU/gRPCServices/Protobuf/gen/spot_service"; //Нужно ли указывать версию (spot_service/v2)???

//Предоставления данных о рынках
service SpotInstrumentService {
  rpc ViewMarket(ViewReq) returns (ViewResp);
}

//Запрос для ViewMarket
message ViewReq {
  common.UserRole user_roles = 1;
  string user_id = 2 [(validate.rules).string.uuid = true];
  int32 page_size = 3 [(validate.rules).int32 = {
    gte: 0
    lte: 50
  }];
  string page_token = 4;
}

//Ответ для ViewMarket
message ViewResp {
  repeated Markets enable_markets = 1;
  string page_token = 2;
}

message Markets {
  string market_id = 1;
  string market_name = 2;
}
